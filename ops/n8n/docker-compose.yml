services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${N8N_PUBLIC_PORT:-5678}:5678"
    environment:
      TZ: ${TZ:-Europe/Bratislava}
      GENERIC_TIMEZONE: ${TZ:-Europe/Bratislava}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      N8N_HOST: ${N8N_HOST:-127.0.0.1}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://127.0.0.1:5678/}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://127.0.0.1:5678/}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v20.0}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      JAKUB_WHATSAPP_TO: ${JAKUB_WHATSAPP_TO:-421944844489}
    volumes:
      - n8n_data:/home/node/.n8n

  nocodb:
    image: nocodb/nocodb:latest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${NOCODB_PUBLIC_PORT:-8080}:8080"
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-n8n}&p=${POSTGRES_PASSWORD}&d=jakub_crm"
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:?Set NOCODB_JWT_SECRET in .env}
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-http://127.0.0.1:8080}
    volumes:
      - nocodb_data:/usr/app/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    depends_on:
      - n8n

volumes:
  postgres_data:
  n8n_data:
  nocodb_data:
