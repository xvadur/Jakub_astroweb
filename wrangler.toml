name = "jakubastroweb"
main = "workers/site-worker.js"
compatibility_date = "2026-05-26"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "404-page"

[vars]
BOOKING_TIME_ZONE = "Europe/Bratislava"
BOOKING_SLOT_MINUTES = "30"
BOOKING_SLOT_TIMES = "09:00,11:30,14:30,17:00"
BOOKING_WORKING_DAYS = "1,2,3,4,5"
BOOKING_ALLOWED_ORIGINS = "https://jakubolsa.sk,https://staging.jakubolsa.sk,http://127.0.0.1:4321,http://localhost:4321,http://127.0.0.1:8787,http://localhost:8787"
